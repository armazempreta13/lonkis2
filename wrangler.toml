name = "lk-imports-images"
type = "service"
main = "src/workers/imageOptimizer.ts"
compatibility_date = "2024-12-11"

# Cloudflare Pages configuration binding
pages_build_output_dir = "dist"

# KV namespace for caching image metadata
kv_namespaces = [
  { binding = "IMAGE_CACHE", id = "YOUR_KV_NAMESPACE_ID", preview_id = "YOUR_PREVIEW_KV_ID" }
]

[build.upload]
format = "modules"

[env.production]
vars = { ENVIRONMENT = "production", CLOUDFLARE_ACCOUNT_ID = "YOUR_ACCOUNT_ID" }

[env.preview]
vars = { ENVIRONMENT = "preview", CLOUDFLARE_ACCOUNT_ID = "YOUR_ACCOUNT_ID" }

[[routes]]
pattern = "lkimports.net/api/images/*"
zone_name = "lkimports.net"

[[routes]]
pattern = "*.lkimports.net/api/images/*"
zone_name = "lkimports.net"
